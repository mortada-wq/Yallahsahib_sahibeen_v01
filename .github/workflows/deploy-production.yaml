name: Production Deployment

on:
  push:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest

    steps:
      - name: Check if deployment is configured
        id: check-secrets
        run: |
          if [[ -n "${{ secrets.CLOUDFLARE_API_TOKEN }}" && -n "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]]; then
            echo "configured=true" >> $GITHUB_OUTPUT
          else
            echo "configured=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        if: steps.check-secrets.outputs.configured == 'true'
        uses: actions/checkout@v4

      - name: Setup and Build
        if: steps.check-secrets.outputs.configured == 'true'
        uses: ./.github/actions/setup-and-build

      - name: Deploy to Cloudflare Pages
        if: steps.check-secrets.outputs.configured == 'true'
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: yalla-sahib
          directory: build/client
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Deployment not configured
        if: steps.check-secrets.outputs.configured == 'false'
        run: |
          echo "Production deployment skipped: missing CLOUDFLARE_API_TOKEN and/or CLOUDFLARE_ACCOUNT_ID secrets."
          exit 1
